<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Sondhan</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--white);
      position: relative;
      overflow: hidden;
    }
    .page-404::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 30%, rgba(26,110,245,0.05), transparent 65%),
        radial-gradient(ellipse 55% 55% at 80% 70%, rgba(15,170,104,0.05), transparent 65%);
      pointer-events: none;
    }
    .err-code {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 1;
      background: linear-gradient(135deg, var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      position: relative;
    }
    .err-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 800;
      color: var(--text-900);
      margin-bottom: 14px;
      position: relative;
    }
    .err-desc {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: var(--text-500);
      max-width: 380px;
      line-height: 1.8;
      margin-bottom: 40px;
      position: relative;
    }
    .err-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: 999px;
      padding: 7px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 32px;
      position: relative;
    }
  </style>
</head>
<body>
  <main class="page-404">
    <div class="err-badge">🔍 Sondhan</div>
    <div class="err-code" aria-label="Error 404">404</div>
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-desc">
      We couldn't find what you were looking for.<br>
      Let's get you back to fact-checking.
    </p>
    <a href="index.html" class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Home
    </a>
  </main>
</body>
</html>
